<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作归档 · 总览</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #0a3d62 0%, #1e5f91 100%);
      color: white;
      padding: 32px 40px 28px;
    }
    .header-inner { max-width: 860px; margin: 0 auto; }
    .header h1 { font-size: 24px; font-weight: 700; }
    .header .subtitle { font-size: 14px; opacity: 0.7; margin-top: 6px; }

    .container { max-width: 860px; margin: 0 auto; padding: 28px 16px 60px; }

    .month-label {
      font-size: 13px;
      font-weight: 700;
      color: #0a3d62;
      letter-spacing: 1px;
      margin: 28px 0 12px;
      text-transform: uppercase;
    }

    .day-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 10px;
      overflow: hidden;
      text-decoration: none;
      display: block;
      transition: box-shadow 0.2s, transform 0.15s;
    }
    .day-card:hover {
      box-shadow: 0 4px 16px rgba(10,61,98,0.12);
      transform: translateY(-1px);
    }
    .day-card-inner {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 16px;
    }
    .day-date {
      min-width: 56px;
      text-align: center;
    }
    .day-date .dd {
      font-size: 26px;
      font-weight: 800;
      color: #0a3d62;
      line-height: 1;
    }
    .day-date .dw {
      font-size: 11px;
      color: #95a5a6;
      margin-top: 2px;
    }
    .day-divider {
      width: 1px;
      height: 40px;
      background: #eef1f4;
    }
    .day-content { flex: 1; }
    .day-title { font-size: 14px; font-weight: 700; color: #2d3436; }
    .day-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .tag-data { background: #e8f4fd; color: #1e5f91; }
    .tag-email { background: #edfaf1; color: #00b894; }
    .tag-action { background: #fff3e0; color: #e17055; }
    .tag-warn { background: #fff0f0; color: #d63031; }
    .day-arrow { color: #b2bec3; font-size: 18px; }

    .empty {
      text-align: center;
      color: #b2bec3;
      font-size: 14px;
      padding: 40px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>📋 工作归档</h1>
    <div class="subtitle">每日日报、邮件摘要、重点事项 · 点击查看详情</div>
  </div>
</div>

<div class="container">

  <div class="month-label">📅 2026年3月</div>

  <a class="day-card" href="2026-03-25.html">
    <div class="day-card-inner">
      <div class="day-date">
        <div class="dd">25</div>
        <div class="dw">周三</div>
      </div>
      <div class="day-divider"></div>
      <div class="day-content">
        <div class="day-title">运营日报 · 全网GMV 107.6万 WoW -13.3%</div>
        <div class="day-tags">
          <span class="tag tag-data">📊 日报数据</span>
          <span class="tag tag-email">📬 邮件总结 452封</span>
          <span class="tag tag-action">🎯 5组行动计划</span>
          <span class="tag tag-warn">⚠️ 3项高优待处理</span>
        </div>
      </div>
      <div class="day-arrow">›</div>
    </div>
  </a>

</div>

</body>
</html>
