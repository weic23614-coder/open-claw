function labelBadge(l) {
  const map = {'C端协议量品':'badge-blue','C端合作品（无协议）':'badge-green','C端合作品':'badge-green',
    '非合作重点品-T1级':'badge-orange','非合作重点品-T2级':'badge-purple',
    '非合作重点品-T3级':'badge-gray','非合作重点品':'badge-gray'};
  return `<span class="badge ${map[l]||'badge-gray'}">${l}</span>`;
}
function marginColor(m){return m>=20?'#2ecc71':m>=10?'#5dade2':m>=5?'#f39c12':'#e74c3c';}
function buildSelects(data, deptId, buyerId, labelId) {
  const depts=[...new Set(data.map(x=>x.dept))].sort();
  const buyers=[...new Set(data.map(x=>x.buyer))].sort();
  const deptEl=document.getElementById(deptId);
  const buyerEl=document.getElementById(buyerId);
  depts.forEach(d=>{const o=document.createElement('option');o.value=d;o.text=d;deptEl.append(o);});
  buyers.forEach(b=>{const o=document.createElement('option');o.value=b;o.text=b;buyerEl.append(o);});
  if(labelId){
    const labels=[...new Set(data.map(x=>x.label))].sort();
    const labelEl=document.getElementById(labelId);
    labels.forEach(l=>{const o=document.createElement('option');o.value=l;o.text=l;labelEl.append(o);});
  }
}

function buildOosKpis() {
  const total=OOS_DATA.length;
  const noTransit=OOS_DATA.filter(x=>x.in_transit===0).length;
  const totalGmv=OOS_DATA.reduce((a,x)=>a+x.last_gmv,0);
  const depts=[...new Set(OOS_DATA.map(x=>x.dept))].length;
  document.getElementById('oos-kpis').innerHTML=`
    <div class="kpi danger"><div class="kpi-label">缺货SKU总数</div><div class="kpi-val">${total}</div><div class="kpi-sub">涉及${depts}个科室</div></div>
    <div class="kpi danger"><div class="kpi-label">无在途（最危险）</div><div class="kpi-val">${noTransit}</div><div class="kpi-sub">0库存+0在途，需紧急补货</div></div>
    <div class="kpi warn"><div class="kpi-label">缺货上月GMV损失</div><div class="kpi-val">${totalGmv.toFixed(1)}<span>万</span></div><div class="kpi-sub">参考上月销售额</div></div>
    <div class="kpi blue"><div class="kpi-label">有在途补货中</div><div class="kpi-val">${total-noTransit}</div><div class="kpi-sub">已有补货在途</div></div>`;
}
function buildLtKpis() {
  const total=LT_DATA.length;
  const lt7=LT_DATA.filter(x=>x.turnover_days>0&&x.turnover_days<7).length;
  const totalGmv=LT_DATA.reduce((a,x)=>a+x.last_gmv,0);
  const depts=[...new Set(LT_DATA.map(x=>x.dept))].length;
  document.getElementById('lt-kpis').innerHTML=`
    <div class="kpi warn"><div class="kpi-label">低周转SKU（&lt;15天）</div><div class="kpi-val">${total}</div><div class="kpi-sub">涉及${depts}个科室（已排除缺货）</div></div>
    <div class="kpi danger"><div class="kpi-label">极危（&lt;7天）</div><div class="kpi-val">${lt7}</div><div class="kpi-sub">可能本周断货</div></div>
    <div class="kpi blue"><div class="kpi-label">涉及上月GMV</div><div class="kpi-val">${totalGmv.toFixed(1)}<span>万</span></div><div class="kpi-sub">有断货风险</div></div>`;
}

function getOosRow(x) {
  const transit = x.in_transit>0 ? `<span class="has-transit">+${x.in_transit}</span>` : `<span class="no-transit">无在途</span>`;
  return `<tr>
    <td><span class="dept-tag">${x.dept}</span></td>
    <td><strong>${x.name}</strong></td>
    <td>${labelBadge(x.label)}</td>
    <td><strong style="color:#f39c12">${x.buyer||'-'}</strong></td>
    <td>${x.operator||'-'}</td>
    <td>${x.supply_dept||'-'}</td>
    <td><span class="status-oos">0</span></td>
    <td>${transit}</td>
    <td>${x.last_gmv>0?x.last_gmv+'万':'-'}</td>
    <td>${x.last_customers>0?x.last_customers.toLocaleString():'-'}</td>
  </tr>`;
}
function getLtRow(x) {
  const tdColor = x.turnover_days<7?'#e74c3c':x.turnover_days<10?'#e67e22':'#f39c12';
  const transit = x.in_transit>0 ? `<span class="has-transit">+${x.in_transit}</span>` : `<span class="no-transit">无在途</span>`;
  return `<tr>
    <td><span class="dept-tag">${x.dept}</span></td>
    <td><strong>${x.name}</strong></td>
    <td>${labelBadge(x.label)}</td>
    <td><strong style="color:#f39c12">${x.buyer||'-'}</strong></td>
    <td>${x.operator||'-'}</td>
    <td>${x.supply_dept||'-'}</td>

    <td><strong style="color:${tdColor}">${x.turnover_days}天</strong></td>
    <td>${x.last_gmv>0?x.last_gmv+'万':'-'}</td>
    <td>${x.last_customers>0?x.last_customers.toLocaleString():'-'}</td>
  </tr>`;
}

function renderPagination(containerId, page, total, cb) {
  const pages = Math.ceil(total/PAGE_SIZE);
  let html = '';
  if(pages<=1){document.getElementById(containerId).innerHTML='';return;}
  if(page>1) html+=`<button class="page-btn" onclick="${cb}(${page-1})">‹ 上一页</button>`;
  const start=Math.max(1,page-2), end=Math.min(pages,page+2);
  if(start>1) html+=`<button class="page-btn" onclick="${cb}(1)">1</button>${start>2?'<span class="page-info">…</span>':''}`;
  for(let i=start;i<=end;i++) html+=`<button class="page-btn${i===page?' active':''}" onclick="${cb}(${i})">${i}</button>`;
  if(end<pages) html+=`${end<pages-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="${cb}(${pages})">${pages}</button>`;
  if(page<pages) html+=`<button class="page-btn" onclick="${cb}(${page+1})">下一页 ›</button>`;
  html+=`<span class="page-info">共${total}条，第${page}/${pages}页</span>`;
  document.getElementById(containerId).innerHTML=html;
}

function renderOos(p) {
  oosPage=p||1;
  const start=(oosPage-1)*PAGE_SIZE, end=start+PAGE_SIZE;
  document.getElementById('oos-tbody').innerHTML=oosFiltered.slice(start,end).map(getOosRow).join('');
  document.getElementById('oos-count').textContent=`共 ${oosFiltered.length} 条`;
  renderPagination('oos-pages',oosPage,oosFiltered.length,'renderOos');
}
function renderLt(p) {
  ltPage=p||1;
  const start=(ltPage-1)*PAGE_SIZE, end=start+PAGE_SIZE;
  document.getElementById('lt-tbody').innerHTML=ltFiltered.slice(start,end).map(getLtRow).join('');
  document.getElementById('lt-count').textContent=`共 ${ltFiltered.length} 条`;
  renderPagination('lt-pages',ltPage,ltFiltered.length,'renderLt');
}

function filterOos() {
  const q=document.getElementById('oos-search').value.toLowerCase();
  const dept=document.getElementById('oos-dept').value;
  const buyer=document.getElementById('oos-buyer').value;
  const label=document.getElementById('oos-label').value;
  oosFiltered=OOS_DATA.filter(x=>
    (!q||(x.name+x.dept+x.buyer+x.operator).toLowerCase().includes(q))&&
    (!dept||x.dept===dept)&&(!buyer||x.buyer===buyer)&&(!label||x.label===label));
  renderOos(1);
}
function filterLt() {
  const q=document.getElementById('lt-search').value.toLowerCase();
  const dept=document.getElementById('lt-dept').value;
  const buyer=document.getElementById('lt-buyer').value;
  ltFiltered=LT_DATA.filter(x=>
    (!q||(x.name+x.dept+x.buyer+x.operator).toLowerCase().includes(q))&&
    (!dept||x.dept===dept)&&(!buyer||x.buyer===buyer));
  renderLt(1);
}

const oosCols=['dept','name','label','buyer','operator','supply_dept','avail_stock','in_transit','last_gmv','last_customers'];
const ltCols=['dept','name','label','buyer','operator','supply_dept','avail_stock','in_transit','turnover_days','last_gmv','last_customers'];

function sortTable(type, col) {
  if(type==='oos'){
    if(oosSortCol===col) oosSortDir*=-1; else {oosSortCol=col;oosSortDir=-1;}
    const k=oosCols[col];
    oosFiltered.sort((a,b)=>{const v=typeof a[k]==='number'?(a[k]-b[k]):(a[k]||'').localeCompare(b[k]||'');return v*oosSortDir;});
    document.querySelectorAll('#oos-table th').forEach((th,i)=>{th.className=i===col?(oosSortDir===1?'sorted-asc':'sorted-desc'):''});
    renderOos(1);
  } else {
    if(ltSortCol===col) ltSortDir*=-1; else {ltSortCol=col;ltSortDir=-1;}
    const k=ltCols[col];
    ltFiltered.sort((a,b)=>{const v=typeof a[k]==='number'?(a[k]-b[k]):(a[k]||'').localeCompare(b[k]||'');return v*ltSortDir;});
    document.querySelectorAll('#lt-table th').forEach((th,i)=>{th.className=i===col?(ltSortDir===1?'sorted-asc':'sorted-desc'):''});
    renderLt(1);
  }
}

function switchTab(id, e) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

// Init
buildOosKpis(); buildLtKpis();
buildSelects(OOS_DATA,'oos-dept','oos-buyer','oos-label');
buildSelects(LT_DATA,'lt-dept','lt-buyer',null);
oosFiltered.sort((a,b)=>b.last_gmv-a.last_gmv);
ltFiltered.sort((a,b)=>a.turnover_days-b.turnover_days);
renderOos(1); renderLt(1);
document.getElementById('oos-tab-count').textContent=`(${OOS_DATA.length})`;
document.getElementById('lt-tab-count').textContent=`(${LT_DATA.length})`;
</script>
